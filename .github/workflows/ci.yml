name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache yarn (if used)
        uses: actions/cache@v4
        with:
          path: ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache pnpm (if used)
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Cache server-stubs node_modules
        uses: actions/cache@v4
        with:
          path: server-stubs/node_modules
          key: ${{ runner.os }}-server-stubs-${{ hashFiles('server-stubs/package-lock.json') }}-${{ hashFiles('server-stubs/package.json') }}
          restore-keys: |
            ${{ runner.os }}-server-stubs-

      - name: Install server-stubs dependencies
        run: |
          cd server-stubs
          npm ci

      - name: Run server-stubs tests
        run: |
          cd server-stubs
          npm test

      - name: Upload server-stubs coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: server-stubs/coverage/lcov.info
          flags: server-stubs
          fail_ci_if_error: true

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
