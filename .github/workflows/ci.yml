name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install server-stubs dependencies
        run: |
          cd server-stubs
          npm ci

      - name: Run server-stubs tests
        run: |
          cd server-stubs
          npm test

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
